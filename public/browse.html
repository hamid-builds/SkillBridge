<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="description" content="Browse student gigs on SkillBridge - FAST NUCES Lahore campus marketplace">
    <title>Browse gigs - SkillBridge</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500;600;700;800&family=Geist+Mono:wght@400;500&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="/css/shared.css">

    <style>
        /* =========================================================
           Browse-specific styles
           Card / grid / empty-state / skeleton styles now live in
           shared.css since they are reused across browse, search,
           my-gigs, profile, etc. Only the truly page-specific bits
           stay here.
           ========================================================= */
        .browse-hero {
            margin-bottom: 36px;
        }

            .browse-hero .eyebrow {
                margin-bottom: 18px;
            }

            .browse-hero h1 {
                margin-bottom: 18px;
                max-width: 17ch;
            }

            .browse-hero .sub {
                color: var(--text-dim);
                font-size: 16px;
                line-height: 1.55;
                max-width: 56ch;
            }

        @media (max-width: 599px) {
            .browse-hero {
                margin-bottom: 24px;
            }

                .browse-hero h1 {
                    font-size: clamp(32px, 8vw, 44px);
                }

                .browse-hero .sub {
                    font-size: 14px;
                }
        }
    </style>
</head>
<body>

    <!-- Page wrap is the centered 1380px max-width container -->
    <div class="wrap">

        <!-- Floating glass nav lives INSIDE the wrap, rendered by shared.js -->
        <div id="topnav-mount"></div>

        <!-- Hero -->
        <section class="browse-hero">
            <div class="eyebrow" id="heroEyebrow">Campus marketplace</div>
            <h1 class="hero-h1">Find <span class="accent">help</span> on your campus.</h1>
            <p class="sub">Browse gigs from FAST students. Designers, writers, coders, tutors, and more.</p>
        </section>

        <!-- Search bar (page-level, big, prominent) -->
        <div class="search-bar">
            <svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="7" /><line x1="16" y1="16" x2="22" y2="22" /></svg>
            <input id="search-input" type="text" placeholder="Search gigs by skill, keyword, or seller name..." autocomplete="off" spellcheck="false">
            <button class="search-go" id="search-go">Search</button>
            <div id="search-autocomplete" class="autocomplete" role="listbox"></div>
        </div>

        <!-- Category pills -->
        <div class="pills" id="categoryPills" role="tablist" aria-label="Filter by category">
            <!-- filled by browse.js -->
        </div>

        <!-- Section header: "All Gigs (count)" + sort segmented control -->
        <div class="sec-head">
            <h2>All Gigs <span class="count" id="resultCount"></span></h2>
            <div class="sort-toggle" role="tablist" aria-label="Sort gigs by">
                <button type="button" data-sort="newest" class="on">Recent</button>
                <button type="button" data-sort="price_asc">Price &uarr;</button>
                <button type="button" data-sort="price_desc">Price &darr;</button>
            </div>
        </div>

        <!-- Gig grid -->
        <section id="gigGrid" class="gig-grid" aria-busy="true"></section>

        <!-- Empty state -->
        <section id="emptyState" class="empty-state" hidden>
            <div class="empty-icon">
                <svg viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="12" cy="12" r="9" />
                    <path d="M8 14s1.5 2 4 2 4-2 4-2" />
                    <line x1="9" y1="9" x2="9.01" y2="9" />
                    <line x1="15" y1="9" x2="15.01" y2="9" />
                </svg>
            </div>
            <h2 id="emptyTitle">No gigs yet</h2>
            <p id="emptyMsg">Be the first to create a gig and start earning.</p>
            <div id="emptyAction"></div>
        </section>

    </div>

    <script src="/js/shared.js"></script>
    <script src="/js/browse.js"></script>

</body>
</html>
