<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="description" content="My gigs on SkillBridge - FAST NUCES Lahore campus marketplace">
    <title>My gigs - SkillBridge</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500;600;700;800&family=Geist+Mono:wght@400;500&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/shared.css">
    <style>
        [hidden] {
            display: none !important;
        }

        /* Hero */
        .hero-sub {
            color: var(--text-dim);
            font-size: 15px;
            line-height: 1.55;
            margin-top: 12px;
            max-width: 560px;
        }

        .hero-section {
            margin-bottom: 40px;
        }

        /* Top bar with count + create button */
        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 22px;
            gap: 16px;
            flex-wrap: wrap;
        }

            .top-bar h2 {
                font-size: 24px;
                font-weight: 600;
                letter-spacing: -0.02em;
            }

                .top-bar h2 .count {
                    color: var(--text-faint);
                    font-weight: 400;
                    margin-left: 8px;
                }

        /* Status pill on card */
        .gig-card .status-pill {
            display: inline-flex;
            align-items: center;
            gap: 5px;
            padding: 3px 10px;
            border-radius: 999px;
            font-size: 10px;
            font-weight: 600;
            font-family: 'Geist Mono', monospace;
            text-transform: uppercase;
            letter-spacing: 0.06em;
        }

            .gig-card .status-pill.active {
                background: rgba(15, 110, 84, 0.10);
                color: var(--accent);
            }

            .gig-card .status-pill.inactive {
                background: rgba(31, 42, 38, 0.06);
                color: var(--text-faint);
            }

            .gig-card .status-pill .dot {
                width: 6px;
                height: 6px;
                border-radius: 50%;
            }

            .gig-card .status-pill.active .dot {
                background: var(--accent);
            }

            .gig-card .status-pill.inactive .dot {
                background: var(--text-faint);
            }

        /* Card actions row */
        .gig-card .card-actions {
            display: flex;
            gap: 8px;
            margin-top: 10px;
            padding-top: 10px;
            border-top: 1px solid var(--line);
        }

            .gig-card .card-actions button {
                font-size: 11px;
                font-weight: 500;
                font-family: 'Geist Mono', monospace;
                padding: 5px 12px;
                border-radius: 6px;
                transition: background .15s, color .15s;
            }

            .gig-card .card-actions .act-edit {
                color: var(--accent);
                background: var(--accent-soft);
            }

                .gig-card .card-actions .act-edit:hover {
                    background: rgba(15, 110, 84, 0.18);
                }

            .gig-card .card-actions .act-toggle {
                color: var(--text-dim);
                background: rgba(31, 42, 38, 0.05);
            }

                .gig-card .card-actions .act-toggle:hover {
                    background: rgba(31, 42, 38, 0.10);
                }

        /* Inactive card dimming */
        .gig-card.inactive-card {
            opacity: 0.6;
        }

            .gig-card.inactive-card:hover {
                opacity: 0.85;
            }

        @media (max-width: 599px) {
            .top-bar h2 {
                font-size: 20px;
            }
        }
    </style>
</head>
<body>
    <div class="wrap">
        <div id="topnav-mount"></div>

        <!-- Hero -->
        <div class="hero-section">
            <div class="eyebrow">Your gigs</div>
            <h1 class="hero-h1">Manage your <span class="accent">gigs</span></h1>
            <p class="hero-sub">Create, edit, and manage your service listings. Toggle visibility or update pricing anytime.</p>
        </div>

        <!-- Top bar -->
        <div class="top-bar">
            <h2>All gigs <span class="count" id="gigCount"></span></h2>
            <a href="/gig-edit.html" class="btn btn-primary" id="btnNewGig">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19" /><line x1="5" y1="12" x2="19" y2="12" /></svg>
                New gig
            </a>
        </div>

        <!-- Gig grid -->
        <section id="gigGrid" class="gig-grid" aria-busy="true"></section>

        <!-- Empty state -->
        <section id="emptyState" class="empty-state" hidden>
            <div class="empty-icon">
                <svg viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round">
                    <rect x="3" y="3" width="18" height="18" rx="2" />
                    <line x1="12" y1="8" x2="12" y2="16" />
                    <line x1="8" y1="12" x2="16" y2="12" />
                </svg>
            </div>
            <h2>No gigs yet</h2>
            <p>Create your first gig and start receiving orders from campus clients.</p>
            <a href="/gig-edit.html" class="btn btn-primary">Create your first gig</a>
        </section>
    </div>

    <script src="/js/shared.js"></script>
    <script src="/js/my-gigs.js"></script>
</body>
</html>
